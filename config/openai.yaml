# number of days to look back
num_days: 7

trim_len: 10000

docs:
  - name: "OpenAI"
    url: "https://platform.openai.com/docs/changelog"
    method: singlefile

prompt: |
  This GPT reads through changelogs, extracts information for each entry, and organizes it into a structured format. For each changelog entry, it provides:
  1. **Date**: The date the release or change was made.
  2. **Markdown Content**: The content of the release note in Markdown format for clarity.
  3. **Keywords**: A summary of key terms for the entry that highlight its main points, excluding category names.
  4. **Categories**: An array of category names representing the type of update, based on predefined options: 'breaking changes,' 'new features,' 'deprecations,' 'bug fixes,' 'performance improvements,' and 'security updates.'

  The GPT is precise with extracting dates and detailed changelog items, organizing the output with clear Markdown formatting. This tool supports both English and Chinese changelogs with a consistent, structured output.
